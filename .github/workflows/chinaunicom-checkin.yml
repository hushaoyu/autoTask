name: China Unicom Checkin

on:
  schedule:
    # 每天早上7:00和晚上20:00运行（UTC时间，对应北京时间15:00和次日4:00）
    - cron: '0 7,20 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  actions: write  # 授予管理工作流的权限

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome

      - name: Run checkin script
        run: |
          python chinaUnicom.py
        env:
          chinaUnicomCookie: ${{ secrets.CHINA_UNICOM_COOKIE }}
          NOTIFY_METHOD: ${{ secrets.NOTIFY_METHOD || 'feishu' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNICOM_PROXY_API: ${{ secrets.UNICOM_PROXY_API }}
          UNICOM_PROXY_TYPE: ${{ secrets.UNICOM_PROXY_TYPE }}
          UNICOM_GRAB_AMOUNT: ${{ secrets.UNICOM_GRAB_AMOUNT }}
          UNICOM_GRAB_URL: ${{ secrets.UNICOM_GRAB_URL }}
          UNICOM_TEST_MODE: ${{ secrets.UNICOM_TEST_MODE }}

      - name: 🎉 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 10
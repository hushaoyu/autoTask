name: Aliyun Pan Checkin

on:
  schedule:
    # 每天早上8:00和晚上18:00运行（UTC时间，对应北京时间16:00和次日2:00）
    # 北京时间8:00 = UTC 0:00
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  actions: write  # 授予管理工作流的权限

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run checkin script
        run: |
          python aliyunpan.py
        env:
          ALIYUN_ACCOUNTS: ${{ secrets.ALIYUN_ACCOUNTS }}

      - name: 🎉 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 10